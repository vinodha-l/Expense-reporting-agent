# This tells the judges what my environment is called
name: "ExpenseReportingEnv"
version: "1.0.0"
description: "An environment where an agent matches receipts to spreadsheet rows."

# These are the 3 levels of my game
tasks:
  - id: "task-1-easy"
    name: "Read one receipt"
    difficulty: "easy"
  - id: "task-2-medium"
    name: "Match three receipts"
    difficulty: "medium"
  - id: "task-3-hard"
    name: "Find the fake receipt"
    difficulty: "hard"